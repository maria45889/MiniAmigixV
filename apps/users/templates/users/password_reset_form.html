<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#ffd6e7,#ffeef6);display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:45px;border-radius:35px;box-shadow:0 25px 60px rgba(0,0,0,.15);width:420px;text-align:center;}
h1{color:#ff4fa0;margin-bottom:10px;}
.subtitle{color:#666;margin-bottom:20px;font-size:15px;}
.input-group{margin-bottom:18px;text-align:left;}
label{display:block;margin-bottom:8px;font-size:14px;font-weight:bold;color:#555;}
input{width:100%;padding:15px;border:none;border-radius:18px;background:#f8f8f8;outline:none;}
button{width:100%;padding:16px;border:none;border-radius:18px;background:linear-gradient(90deg,#ff4fa0,#ff70b5);color:white;font-weight:bold;cursor:pointer;}
button:hover{transform:translateY(-2px);}
.message{margin-bottom:10px;padding:14px 16px;border-radius:16px;font-size:0.95rem;line-height:1.4;}
.message.success{background:rgba(0,213,161,0.12);border:1px solid rgba(0,213,161,0.25);color:#0c5f3f;}
.message.error{background:rgba(255,94,111,0.12);border:1px solid rgba(255,94,111,0.25);color:#8b1a2f;}
.link{margin-top:18px;font-size:14px;color:#ff4fa0;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
<h1>Restablecer contraseña</h1>
<p class="subtitle">Ingresa tu correo o apodo para recibir el enlace de restablecimiento.</p>
{% if form.errors %}
<div class="message error">Por favor verifica tu correo electrónico o tu apodo.</div>
{% endif %}
<form method="post">
{% csrf_token %}
<div class="input-group">
<label for="id_identifier">Correo electrónico o apodo</label>
{{ form.identifier }}
</div>
<button type="submit">Enviar correo de restablecimiento</button>
</form>
<a href="{% url 'login' %}" class="link">Volver a iniciar sesión</a>
</div>
</body>
</html>
