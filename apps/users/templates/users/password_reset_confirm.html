<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crea una nueva contraseña</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#ffd6e7,#ffeef6);display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:45px;border-radius:35px;box-shadow:0 25px 60px rgba(0,0,0,.15);width:420px;text-align:center;}
h1{color:#ff4fa0;margin-bottom:10px;}
.subtitle{color:#666;margin-bottom:20px;font-size:15px;}
.input-group{margin-bottom:18px;text-align:left;}
label{display:block;margin-bottom:8px;font-size:14px;font-weight:bold;color:#555;}
input{width:100%;padding:15px;border:none;border-radius:18px;background:#f8f8f8;outline:none;}
button{width:100%;padding:16px;border:none;border-radius:18px;background:linear-gradient(90deg,#ff4fa0,#ff70b5);color:white;font-weight:bold;cursor:pointer;}
button:hover{transform:translateY(-2px);}
.link{margin-top:18px;font-size:14px;color:#ff4fa0;text-decoration:none;display:block;}
</style>
</head>
<body>
<div class="card">
<h1>Nueva contraseña</h1>
<p class="subtitle">Escribe tu nueva contraseña a continuación.</p>
<form method="post">
{% csrf_token %}
<div class="input-group">
<label for="id_new_password1">Nueva contraseña</label>
{{ form.new_password1 }}
</div>
<div class="input-group">
<label for="id_new_password2">Repite la nueva contraseña</label>
{{ form.new_password2 }}
</div>
<button type="submit">Cambiar contraseña</button>
</form>
<a href="{% url 'login' %}" class="link">Volver a iniciar sesión</a>
</div>
</body>
</html>
