<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro MiniAmigixV 💕</title>

<style>
body{
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ffeef6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:25px;
width:380px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
text-align:center;
}

h1{
color:#ff4fa0;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#f5f5f5;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#ff4fa0,#ff70b5);
color:white;
font-weight:bold;
cursor:pointer;
}

a{
display:block;
margin-top:15px;
color:#ff4fa0;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<h1>Crear cuenta 💕</h1>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Usuario" required>

<input type="password" name="password" placeholder="Contraseña" required>

<button type="submit">Registrarme</button>

</form>

<a href="{% url 'login' %}">Ya tengo cuenta</a>

</div>

</body>
</html>
