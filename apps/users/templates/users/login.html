<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MiniAmigixV Login 💕</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#ffeef6);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* decor */
body::before,
body::after{
content:"";
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.2);
}

body::before{
width:700px;
height:700px;
top:-250px;
right:-200px;
}

body::after{
width:500px;
height:500px;
bottom:-200px;
left:-150px;
}

.card{
position:relative;
z-index:2;
background:rgba(255,255,255,.95);
backdrop-filter:blur(10px);
padding:45px;
border-radius:35px;
box-shadow:0 25px 60px rgba(0,0,0,.15);
width:420px;
text-align:center;
}

.logo{font-size:60px;margin-bottom:10px;}

h1{color:#ff4fa0;margin-bottom:10px;}

.subtitle{color:#666;margin-bottom:30px;font-size:15px;}

.input-group{
margin-bottom:18px;
text-align:left;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#555;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:18px;
background:#f8f8f8;
outline:none;
}

input:focus{
background:white;
box-shadow:0 0 0 3px #ffd1e5;
}

.password-row{position:relative;}

.eye{
position:absolute;
right:15px;
top:14px;
cursor:pointer;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
margin-bottom:20px;
color:#666;
}

.options a{
color:#ff4fa0;
text-decoration:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#ff4fa0,#ff70b5);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

.register{
margin-top:20px;
font-size:15px;
}

.register a{
color:#ff4fa0;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">💕</div>
<h1>MiniAmigixV</h1>
<p class="subtitle">Tu plataforma inteligente todo en uno</p>

<form method="POST">
{% csrf_token %}

<div class="input-group">
<label>Usuario</label>
<input type="text" name="username" required>
</div>

<div class="input-group">
<label>Contraseña</label>
<div class="password-row">
<input type="password" id="password" name="password" required>
<span class="eye" onclick="togglePassword()">👁️</span>
</div>
</div>

<div class="options">
<label><input type="checkbox"> Recordarme</label>

<a href="{% url 'password_reset' %}">
¿Olvidaste tu contraseña?
</a>
</div>

<button type="submit">✨ Iniciar Sesión</button>

</form>

<div class="register">
¿No tienes cuenta?
<a href="{% url 'register' %}">Regístrate</a>
</div>

</div>

<script>
function togglePassword(){
const pass = document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
