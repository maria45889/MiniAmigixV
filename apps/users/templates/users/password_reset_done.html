<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correo enviado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#ffd6e7,#ffeef6);display:flex;justify-content:center;align-items:center;min-height:100vh;}
.card{background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:45px;border-radius:35px;box-shadow:0 25px 60px rgba(0,0,0,.15);width:420px;text-align:center;}
h1{color:#ff4fa0;margin-bottom:10px;}
p{color:#666;margin-bottom:20px;font-size:15px;}
a{color:#ff4fa0;text-decoration:none;font-weight:bold;}
</style>
</head>
<body>
<div class="card">
<h1>Correo enviado</h1>
<p>Si existe una cuenta con ese correo, recibirás un enlace para restablecer la contraseña.</p>
<a href="{% url 'login' %}">Volver al inicio de sesión</a>
</div>
</body>
</html>
