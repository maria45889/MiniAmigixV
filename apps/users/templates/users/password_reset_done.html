<!DOCTYPE html>
<html lang="es">
<head>
{% load static %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correo enviado</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:radial-gradient(circle at top left, rgba(135,82,255,0.22), transparent 25%),
      radial-gradient(circle at bottom right, rgba(255,64,179,0.24), transparent 20%),
      #100a1e;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;color:#f0eef7;}
.auth-container{width:420px;max-width:100%;background:rgba(10,6,26,0.92);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(14px);border-radius:26px;box-shadow:0 20px 60px rgba(0,0,0,0.45);padding:36px;}
.logo-container{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:24px;}
.logo-img{width:56px;height:56px;border-radius:18px;background:rgba(255,255,255,0.06);padding:10px;}
.logo{font-size:1.4rem;font-weight:900;letter-spacing:0.08em;color:#ffe3ff;}
h1{font-size:1.95rem;color:#fff;margin-bottom:10px;text-align:center;}
p{color:#b3b3d3;margin-bottom:20px;font-size:0.98rem;line-height:1.6;text-align:center;}
a{color:#c4bfff;text-decoration:none;font-weight:700;}
.button-note{margin-top:14px;color:#b3b3d3;font-size:0.92rem;text-align:center;}
</style>
</head>
<body>
<div class="auth-container">
    <div class="logo-container">
        <img src="{% static 'images/player-logo.svg' %}" alt="MiniAmigixV Logo" class="logo-img">
        <div class="logo">MiniAmigixV</div>
    </div>
    <h1>Correo enviado</h1>
    <p>Si existe una cuenta con ese correo o apodo, recibirás un enlace para restablecer tu contraseña.</p>
    <p class="button-note">En desarrollo, el enlace también puede aparecer en la consola del servidor.</p>
    <div style="text-align:center;margin-top:16px;"><a href="{% url 'login' %}">Volver al inicio de sesión</a></div>
</div>
</body>
</html>
