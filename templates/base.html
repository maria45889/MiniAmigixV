{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff4fa3">
    <meta name="application-name" content="MiniAmigixV">
    <meta name="apple-mobile-web-app-title" content="MiniAmigixV">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>{% block title %}MiniAmigixV{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'miniamigixv.ico' %}">
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'icons/icon-192.png' %}">
    <link rel="apple-touch-icon" href="{% static 'icons/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'manifest.webmanifest' %}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
    <script>
        var switchView = function(viewName, el) {
            document.querySelectorAll('.view-section, .view').forEach(function(s) {
                s.classList.remove('active'); s.style.display = 'none';
            });
            document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
            if (el) { el.classList.add('active'); }
            else {
                var navItem = document.querySelector('[data-view="' + viewName + '"]');
                if (navItem) navItem.classList.add('active');
            }
            var target = document.getElementById('view-' + viewName);
            if (target) {
                target.style.display = viewName === 'home' ? 'flex' : 'block';
                target.classList.add('active');
            } else {
                window.location.href = '/' + viewName + '/';
            }
        };
        window.switchView = switchView;
    </script>
</head>
<body>
    <div class="app-shell">
        {% include 'includes/navbar.html' %}
        <div class="dashboard-container">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="{% static 'js/main.js' %}?v=3" charset="utf-8"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').catch(function() {});
            });
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
